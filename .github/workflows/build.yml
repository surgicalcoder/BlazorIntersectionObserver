name: build

on:
    workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set Node.js
        uses: actions/setup-node@v4
        with:
            node-version: 18.x

      - name: Install npm dependencies
        run: |
            npm ci
        working-directory: src/GoLive.Blazor.IntersectionObserver

      - name: Run tests
        run: |
            npm run test
        working-directory: src/GoLive.Blazor.IntersectionObserver

      - name: Setup Dotnet
        uses: actions/setup-dotnet@v1
        with:
          dotnet-version: '10.x'
      
      - name: Dotnet build
        run: dotnet build --configuration Release

      - name: Dotnet pack
        run: dotnet pack src/GoLive.Blazor.IntersectionObserver/*.csproj --configuration Release --verbosity Detailed
